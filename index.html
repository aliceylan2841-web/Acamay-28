<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kablo Makara Hesaplayıcı Pro v3</title>
    <style>
        /* Ekranın kaymasını engelleyen sabit yapı */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f4f7f6;
        }
        
        .container { 
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            position: relative;
        }
        
        /* Logo Alanı */
        .logo-container { text-align: center; padding: 8px 0; background: white; border-bottom: 1px solid #eee; position: relative; }
        .logo-container img { max-width: 200px; height: 100px; display: block; margin: 0 auto; }

        /* Bilgi Butonu */
        .info-trigger {
            position: absolute;
            right: 15px;
            top: 15px;
            width: 30px;
            height: 30px;
            background: #1565c0;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 100;
        }

        /* Bilgi Paneli (Overlay) */
        .info-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            padding: 20px;
            color: white;
            overflow-y: auto;
        }
        .info-content { background: #fff; color: #333; padding: 20px; border-radius: 12px; position: relative; }
        .close-info { position: absolute; top: 10px; right: 10px; font-size: 24px; cursor: pointer; color: #666; }
        .info-content h3 { color: #1565c0; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .info-content p { font-size: 14px; line-height: 1.4; }
        .info-content ul { padding-left: 20px; font-size: 13px; }
        .info-content li { margin-bottom: 8px; }

        /* Ana Sekmeler */
        .main-tabs { display: flex; background: #f8f9fa; border-bottom: 2px solid #1565c0; }
        .main-tab-btn { flex: 1; padding: 12px 5px; border: none; background: #f8f9fa; cursor: pointer; font-weight: bold; color: #666; font-size: 11px; text-transform: uppercase; }
        .main-tab-btn.active { background: white; color: #1565c0; position: relative; }
        .main-tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 5px; background: #1565c0; }

        /* İçerik Alanı */
        .page-content { flex: 1; overflow-y: auto; padding: 12px 15px; }

        h2 { text-align: center; color: #1565c0; font-size: 15px; margin: 5px 0 12px 0; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .tab-btn { flex: 1; padding: 8px; border: 1.5px solid #1565c0; border-radius: 8px; cursor: pointer; background: white; color: #1565c0; font-weight: bold; font-size: 13px; }
        .tab-btn.active { background: #1565c0; color: white; }

        .group { margin-bottom: 8px; }
        .manual-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 10px; border-bottom: 1px solid #eee; padding: 8px 0; align-items: center; }
        label { display: block; margin-bottom: 3px; font-weight: 400; color: #444; font-size: 12px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; outline: none; }
        input:focus { border-color: #1565c0; box-shadow: 0 0 5px rgba(21,101,192,0.2); }
        
        .calc-btn { width: 100%; padding: 14px; background: #2e7d32; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        
        /* Sonuç Panelleri */
        #sonuc, .manual-result-box { margin-top: 20px; padding: 15px; border-radius: 12px; font-size: 16px; line-height: 1.4; }
        .success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .error { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        .info-row { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.05); padding: 5px 0; }

        .manual-result-box { background: #27ae60; color: white; text-align: center; }
        .res-val { font-size: 24px; font-weight: 700; color: #f1c40f; display: block; }

        /* Yönetim Sayfası */
        .admin-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .m-item { background: #fafafa; padding: 10px; border: 1px solid #eee; margin-bottom: 8px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .m-info b { color: #1565c0; font-size: 14px; }
        .m-actions { display: flex; gap: 5px; }
        .edit-btn { background: #0288d1; color: white; border: none; padding: 6px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .del-btn { background: #c62828; color: white; border: none; padding: 6px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="info-trigger" onclick="toggleInfo()">?</div>
    
    <div id="infoOverlay" class="info-overlay">
        <div class="info-content">
            <span class="close-info" onclick="toggleInfo()">&times;</span>
            <div id="infoText">
                </div>
        </div>
    </div>

    <div class="logo-container">
        <img src="https://i.ibb.co/0j90jQkp/file-00000000249072469c0da962473d3c9a.png" alt="Logo">
    </div>

    <div class="main-tabs">
        <button id="tabCalc" class="main-tab-btn active" onclick="showPage('hesapla')">Otomatik Hesaplama</button>
        <button id="tabManual" class="main-tab-btn" onclick="showPage('manual')">Manuel Hesap</button>
        <button id="tabAdmin" class="main-tab-btn" onclick="showPage('admin')">Makara Yönetimi</button>
    </div>

    <div id="pageHesapla" class="page-content">
        <h2>Makara Seçimi</h2>
        <div class="tabs">
            <button id="btnYuvarlak" class="tab-btn active" onclick="setTur('yuvarlak')">Yuvarlak</button>
            <button id="btnYassi" class="tab-btn" onclick="setTur('yassi')">Yassı</button>
        </div>
        <div id="yuvarlakAlan">
            <div class="group">
                <label>Dış Çap (mm)</label>
                <input type="text" id="cap" placeholder="Örn: 12.5" inputmode="decimal">
            </div>
        </div>
        <div id="yassiAlan" style="display:none;">
            <div class="group"><label>En (mm)</label><input type="text" id="en" placeholder="Örn: 30" inputmode="decimal"></div>
            <div class="group"><label>Boy (mm)</label><input type="text" id="boy" placeholder="Örn: 10" inputmode="decimal"></div>
        </div>
        <div class="group"><label>Uzunluk (Metre)</label><input type="text" id="uzunluk" placeholder="Örn: 500" inputmode="decimal"></div>
        <div class="group"><label>Kablo Net Ağırlığı (kg)</label><input type="text" id="agirlik" placeholder="Opsiyonel" inputmode="decimal"></div>
        <button class="calc-btn" onclick="hesapla()">UYGUN MAKARAYI BUL</button>
        <div id="sonuc" style="display:none;"></div>
    </div>

    <div id="pageManual" class="page-content" style="display:none;">
        <h2>Manuel Kapasite Hesabı</h2>
        <div class="manual-row"><label>Kablo Çapı (mm)</label><input type="number" id="m_cap" placeholder="0" oninput="manuelHesapla()"></div>
        <div class="manual-row"><label>Tolerans Boşluğu (cm)</label><input type="number" id="m_tol" value="5" oninput="manuelHesapla()"></div>
        <div class="manual-row"><label>Makara Dış Çap (A) (cm)</label><input type="number" id="m_makA" placeholder="0" oninput="manuelHesapla()"></div>
        <div class="manual-row"><label>İç Genişlik (C) (cm)</label><input type="number" id="m_makC" placeholder="0" oninput="manuelHesapla()"></div>
        <div class="manual-row"><label>Göbek Çapı (D) (cm)</label><input type="number" id="m_makD" placeholder="0" oninput="manuelHesapla()"></div>
        <div class="manual-row" style="background:#f9f9f9; margin-top:10px;">
            <label>Makara Hacmi (dm³)</label>
            <input type="text" id="m_hacim" readonly style="background:transparent; font-weight:bold; border:none;">
        </div>
        <div class="manual-result-box">
            <span style="font-weight:bold; font-size:12px;">NET KAPASİTE</span>
            <span class="res-val"><span id="m_metre">0</span> <small style="font-size:14px;">METRE</small></span>
        </div>
    </div>

    <div id="pageAdmin" class="page-content" style="display:none;">
        <h2>Makara Ekle / Düzenle</h2>
        <div class="admin-inputs">
            <input type="text" id="mAd" placeholder="Makara Adı">
            <input type="text" id="mHacim" placeholder="Hacim (dm³)" inputmode="decimal">
            <input type="text" id="mKapasite" placeholder="Kapasite (kg)" inputmode="decimal">
            <input type="text" id="mDara" placeholder="Dara (kg)" inputmode="decimal">
        </div>
        <button class="calc-btn" id="btnEkle" style="background:#ff8f00; margin-bottom:15px;" onclick="makaraEkle()">LİSTEYE KAYDET</button>
        <button class="calc-btn" id="btnGuncelle" style="background:#1565c0; display:none; margin-bottom:10px;" onclick="makaraGuncelle()">GÜNCELLE</button>
        <button class="calc-btn" id="btnIptal" style="background:#757575; display:none; margin-bottom:15px;" onclick="temizleAdmin()">İPTAL</button>
        <div id="mListeUI"></div>
    </div>
</div>

<script>
    let kabloTuru = 'yuvarlak';
    let düzenlemeIndex = -1;
    let currentPage = 'hesapla';

    let makaralar = JSON.parse(localStorage.getItem('makaraData')) || [
        { ad: "KARTON 230x200x80", hacim: 4.66, kapasite: 10, dara: 0.75 },
        { ad: "AHŞAP 100", hacim: 239.50, kapasite: 1100, dara: 45 },
        { ad: "AHŞAP 150", hacim: 779.24, kapasite: 2800, dara: 160 }
    ];

    const infoTexts = {
        hesapla: `
            <h3>Otomatik Hesaplama</h3>
            <p>Sistemdeki kayıtlı makaralar arasından kablonuz için en uygun olanı bulur.</p>
            <ul>
                <li><b>Kablo Çapı:</b> Kablonun dış çapını milimetre (mm) cinsinden girin.</li>
                <li><b>Yassı Kablo:</b> En ve Boy ölçülerini mm olarak girin.</li>
                <li><b>Sıralama:</b> Sistem, kablo hacmine %5 sarım payı ekleyerek en küçük uygun makarayı önerir.</li>
                <li><b>Kapasite Kontrolü:</b> Eğer ağırlık girerseniz, makaranın taşıma kapasitesi de kontrol edilir.</li>
            </ul>`,
        manual: `
            <h3>Manuel Hesaplama</h3>
            <p>Kayıtlı olmayan bir makaranın kaç metre kablo alacağını hesaplamak için kullanılır.</p>
            <ul>
                <li><b>Tolerans (cm):</b> Makaranın en dışından ne kadar boşluk kalmasını istediğinizdir (Emniyet payı).</li>
                <li><b>A, C, D Ölçüleri:</b> Makara üreticisi standartlarıdır (cm cinsinden).</li>
                <li><b>Hesaplama:</b> Girdiğiniz ölçülere göre makaranın net kullanılabilir hacmi hesaplanır ve kablo çapına bölünür.</li>
            </ul>`,
        admin: `
            <h3>Makara Yönetimi</h3>
            <p>Uygulamanın kullandığı makara kütüphanesini buradan yönetebilirsiniz.</p>
            <ul>
                <li><b>Hacim (dm³):</b> Makaranın toplam kablo taşıma hacmi.</li>
                <li><b>Kapasite (kg):</b> Makaranın taşıyabileceği maksimum yük.</li>
                <li><b>Dara (kg):</b> Boş makaranın kendi ağırlığı.</li>
                <li>Veriler tarayıcınızın belleğine (LocalStorage) kaydedilir.</li>
            </ul>`
    };

    function toggleInfo() {
        const overlay = document.getElementById('infoOverlay');
        const textDiv = document.getElementById('infoText');
        textDiv.innerHTML = infoTexts[currentPage];
        overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
    }

    function showPage(page) {
        currentPage = page;
        document.getElementById('pageHesapla').style.display = page === 'hesapla' ? 'block' : 'none';
        document.getElementById('pageManual').style.display = page === 'manual' ? 'block' : 'none';
        document.getElementById('pageAdmin').style.display = page === 'admin' ? 'block' : 'none';
        
        document.getElementById('tabCalc').classList.toggle('active', page === 'hesapla');
        document.getElementById('tabManual').classList.toggle('active', page === 'manual');
        document.getElementById('tabAdmin').classList.toggle('active', page === 'admin');
        
        if(page === 'admin') listeYenile();
    }

    function setTur(tur) {
        kabloTuru = tur;
        document.getElementById('yuvarlakAlan').style.display = tur === 'yuvarlak' ? 'block' : 'none';
        document.getElementById('yassiAlan').style.display = tur === 'yassi' ? 'block' : 'none';
        document.getElementById('btnYuvarlak').classList.toggle('active', tur === 'yuvarlak');
        document.getElementById('btnYassi').classList.toggle('active', tur === 'yassi');
    }

    function parseNum(id) {
        let val = document.getElementById(id).value.toString().replace(',', '.');
        return parseFloat(val);
    }

    function manuelHesapla() {
        const d = parseFloat(document.getElementById('m_cap').value) || 0;
        const A = parseFloat(document.getElementById('m_makA').value) || 0;
        const C = parseFloat(document.getElementById('m_makC').value) || 0;
        const D = parseFloat(document.getElementById('m_makD').value) || 0;
        const tol = parseFloat(document.getElementById('m_tol').value) || 0;

        if (d > 0 && A > 0 && C > 0) {
            const birimHacim = Math.pow(((d * 1.05) / 10), 2) * 0.7854 * 100;
            const makaraHacmi = (Math.pow((A - tol), 2) - Math.pow(D, 2)) * 0.7854 * C;
            const sonucMetre = makaraHacmi / birimHacim;

            document.getElementById('m_hacim').value = Math.round(makaraHacmi / 1000);
            document.getElementById('m_metre').innerText = Math.round(sonucMetre);
        } else {
            document.getElementById('m_hacim').value = "0";
            document.getElementById('m_metre').innerText = "0";
        }
    }

    function hesapla() {
        const sonucDiv = document.getElementById('sonuc');
        try {
            const L = parseNum('uzunluk');
            const kg = parseNum('agirlik') || 0;
            if (isNaN(L)) throw "Uzunluk giriniz!";
            
            let hacim = 0;
            if (kabloTuru === 'yuvarlak') {
                const cap = parseNum('cap');
                if(isNaN(cap)) throw "Çap giriniz!";
                hacim = (Math.pow(cap * 1.05, 2) * 0.7854 * L) / 1000;
            } else {
                const en = parseNum('en');
                const boy = parseNum('boy');
                if(isNaN(en) || isNaN(boy)) throw "En ve Boy giriniz!";
                hacim = (en * boy * L * 1.05) / 1000;
            }

            let uygun = makaralar.filter(m => m.hacim >= hacim && (kg === 0 || m.kapasite >= kg)).sort((a,b) => a.hacim - b.hacim);
            
            sonucDiv.style.display = 'block';
            if (uygun.length > 0) {
                let m = uygun[0];
                sonucDiv.className = 'success';
                sonucDiv.innerHTML = `
                    <b>ÖNERİLEN: ${m.ad}</b><br>
                    <div class="info-row"><span>Gereken Hacim:</span> <b>${hacim.toFixed(2)} dm³</b></div>
                    <div class="info-row"><span>Makara Kap./Dara:</span> <b>${m.kapasite}kg / ${m.dara}kg</b></div>
                    <div class="info-row"><span>Tahmini BRÜT:</span> <b>${(kg + m.dara).toFixed(2)} kg</b></div>
                `;
            } else {
                sonucDiv.className = 'error'; 
                sonucDiv.innerHTML = `Uygun makara bulunamadı!<br>Gereken Hacim: ${hacim.toFixed(2)} dm³`;
            }
        } catch (err) { alert(err); }
    }

    function listeYenile() {
        const ui = document.getElementById('mListeUI');
        ui.innerHTML = '';
        makaralar.sort((a,b) => a.hacim - b.hacim).forEach((m, index) => {
            ui.innerHTML += `
                <div class="m-item">
                    <div class="m-info">
                        <b>${m.ad}</b><br>
                        <small>${m.hacim}dm³ | ${m.kapasite}kg | ${m.dara}kg</small>
                    </div>
                    <div class="m-actions">
                        <button class="edit-btn" onclick="makaraDuzenleBasla(${index})">Düzenle</button>
                        <button class="del-btn" onclick="makaraSil(${index})">Sil</button>
                    </div>
                </div>`;
        });
        localStorage.setItem('makaraData', JSON.stringify(makaralar));
    }

    function makaraEkle() {
        const ad = document.getElementById('mAd').value;
        const hacim = parseNum('mHacim');
        if(!ad || isNaN(hacim)) return alert("Ad ve Hacim giriniz!");
        makaralar.push({ ad, hacim, kapasite: parseNum('mKapasite') || 0, dara: parseNum('mDara') || 0 });
        temizleAdmin(); listeYenile();
    }

    function makaraSil(index) { if(confirm("Silinsin mi?")) { makaralar.splice(index, 1); listeYenile(); } }

    function makaraDuzenleBasla(index) {
        düzenlemeIndex = index; const m = makaralar[index];
        document.getElementById('mAd').value = m.ad; document.getElementById('mHacim').value = m.hacim;
        document.getElementById('mKapasite').value = m.kapasite; document.getElementById('mDara').value = m.dara;
        document.getElementById('btnEkle').style.display = 'none'; document.getElementById('btnGuncelle').style.display = 'block'; document.getElementById('btnIptal').style.display = 'block';
    }

    function makaraGuncelle() {
        makaralar[düzenlemeIndex] = { ad: document.getElementById('mAd').value, hacim: parseNum('mHacim'), kapasite: parseNum('mKapasite') || 0, dara: parseNum('mDara') || 0 };
        temizleAdmin(); listeYenile();
    }

    function temizleAdmin() {
        düzenlemeIndex = -1; document.querySelectorAll('#pageAdmin input').forEach(i => i.value = '');
        document.getElementById('btnEkle').style.display = 'block'; document.getElementById('btnGuncelle').style.display = 'none'; document.getElementById('btnIptal').style.display = 'none';
    }
</script>
</body>
</html>
